services:
  postgres:
    image: postgres:16
    container_name: leadpipe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadpipe
      POSTGRES_USER: leadpipe
      POSTGRES_PASSWORD: leadpipe_change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadpipe -d leadpipe"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: leadpipe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
